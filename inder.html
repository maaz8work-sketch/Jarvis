<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Emergent AI | 3D Neural Core</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <!-- CSS will be injected below -->
    <style>
        /* CSS will be placed here in the final file */
    </style>
</head>
<body>
    <!-- 3D Canvas container -->
    <div id="canvas-container"></div>
    
    <!-- UI Overlay -->
    <div class="ui-overlay">
        <div class="glass-panel">
            <div class="header">
                <h1><i class="fas fa-brain"></i> EMERGENT AI</h1>
                <div class="status-indicator">
                    <div class="pulse-dot"></div>
                    <span id="status-text">neural link active</span>
                </div>
            </div>
            <div class="chat-area" id="chat-area">
                <div class="message ai-message">
                    <div class="bubble">🌀 I am your Emergent AI. Voice or text – try "help" to see what I can do.</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="command-input" placeholder="Type a command or use the mic..." autocomplete="off">
                <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                <button id="mic-btn" class="mic-btn"><i class="fas fa-microphone"></i></button>
            </div>
            <div class="footer">
                <i class="fas fa-cube"></i> 3D Core • Voice Enabled • Persistent Memory
            </div>
        </div>
    </div>

    <!-- JavaScript will be placed here -->
    <script type="module">
        // JS will be placed here in the final file
    </script>
</body>
</html>
